<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Inter:opsz,wght@14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>PapiLab</title>
    <style>
      /* Boot splash — shown while the JS bundle is parsing and React mounts.
         React's createRoot(...).render(...) wipes #root's children, so no teardown needed. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        /* Prevent a white flash before the app's own styles load. */
        color-scheme: light dark;
      }
      #root {
        min-height: 100vh;
      }
      .app-boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: drag;
        pointer-events: none;
      }
      .app-boot-splash__icon {
        width: 112px;
        height: 112px;
        opacity: 0;
        transform: scale(0.96);
        animation:
          app-boot-splash-in 420ms ease-out forwards,
          app-boot-splash-pulse 2.4s ease-in-out 420ms infinite;
      }
      @keyframes app-boot-splash-in {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes app-boot-splash-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.98);
          opacity: 0.85;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-boot-splash__icon {
          animation: app-boot-splash-in 200ms ease-out forwards;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot-splash" aria-hidden="true">
        <svg
          class="app-boot-splash__icon"
          viewBox="0 0 376 400"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <style>
            .papilab-boot-blue {
              fill: #46587e;
            }
            .papilab-boot-brown {
              fill: #471a1a;
            }
            @media (prefers-color-scheme: dark) {
              .papilab-boot-blue {
                fill: #afc2e8;
              }
              .papilab-boot-brown {
                fill: #e6b8b8;
              }
            }
          </style>
          <path d="M295 105H95V95H295V105Z" class="papilab-boot-blue" />
          <path d="M376 210H201V200H376V210Z" class="papilab-boot-brown" />
          <path d="M190 200V0H200V200H190Z" class="papilab-boot-brown" />
          <path d="M95 295V95H105V295H95Z" class="papilab-boot-blue" />
          <path d="M200 200H0V190H200V200Z" class="papilab-boot-brown" />
          <path d="M200 400V200H210V400H200Z" class="papilab-boot-brown" />
        </svg>
      </div>
    </div>
    <script type="module" src="/src/bootstrap.ts"></script>
  </body>
</html>
